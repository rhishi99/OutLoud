name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test --config (no audio)
        run: python scripts/speaker.py --config

      - name: Smoke test native engine (playback guarded via OUTLOUD_MUTE)
        run: OUTLOUD_MUTE=1 python scripts/speaker.py --engine native "GitHub Actions CI smoke test — zero audio expected"
